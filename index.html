<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebEdit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Code&family=Google+Sans+Flex:wght@400;500;600&display=swap');
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; color: var(--on-bg); }

        body.light.purple { --bg: #FEF7FF; --on-bg: #1D1B20; --surface: #F3EDF7; --primary: #6750A4; --on-primary: #FFFFFF; --sec-container: #E8DEF8; --on-sec-container: #1D192B; }
        body.dark.purple { --bg: #141218; --on-bg: #E6E0E9; --surface: #211F26; --primary: #D0BCFF; --on-primary: #381E72; --sec-container: #4A4458; --on-sec-container: #E8DEF8; }
        body.light.blue { --bg: #FDFBFF; --on-bg: #1A1C1E; --surface: #DFE2EB; --primary: #0061A4; --on-primary: #FFFFFF; --sec-container: #D1E4FF; --on-sec-container: #001D36; }
        body.dark.blue { --bg: #1A1C1E; --on-bg: #E2E2E6; --surface: #43474E; --primary: #9ECAFF; --on-primary: #003258; --sec-container: #00497D; --on-sec-container: #D1E4FF; }
        body.light.green { --bg: #FCFDF6; --on-bg: #1A1C19; --surface: #DFE4D8; --primary: #386A20; --on-primary: #FFFFFF; --sec-container: #B8F397; --on-sec-container: #042100; }
        body.dark.green { --bg: #1A1C19; --on-bg: #E2E3DD; --surface: #43483E; --primary: #9CD67D; --on-primary: #0C3900; --sec-container: #205107; --on-sec-container: #B8F397; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--on-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        .top-app-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo-link img { height: 32px; display: block; }
        .controls-right { display: flex; gap: 8px; align-items: center; }
        
        .action-btn { background: var(--surface); border: none; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dropdown { background: var(--surface); color: var(--on-bg); border: none; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        
        .view-tabs { display: flex; margin: 0 16px 8px 16px; background-color: var(--surface); border-radius: 16px; overflow: hidden; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--on-bg); padding: 10px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .tab-btn.active { background-color: var(--sec-container); color: var(--on-sec-container); font-weight: 600; }

        .control-panel { display: none; background-color: var(--surface); padding: 16px; border-radius: 24px; flex-direction: column; gap: 12px; margin: 0 8px 8px 8px; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; background-color: var(--bg); color: var(--on-bg); border: 1px solid var(--primary); padding: 12px 16px; border-radius: 16px; font-family: inherit; }
        button.md-btn { background-color: var(--sec-container); color: var(--on-sec-container); border: none; padding: 10px 20px; border-radius: 20px; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
        
        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        textarea { width: 100%; height: 100%; background: transparent; border: none; color: var(--on-bg); padding: 16px 24px; font-size: 16px; font-family: 'Google Sans Code', monospace; resize: none; outline: none; }
        .preview-pane { display: none; width: 100%; height: 100%; padding: 16px 24px; overflow-y: auto; }
        
        footer { background-color: var(--surface); text-align: center; padding: 8px 16px 16px 16px; font-size: 0.75rem; color: var(--on-bg); opacity: 0.7; display: flex; flex-direction: column; gap: 4px; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body class="dark purple">

    <div class="top-app-bar">
        <a href="https://wlpne.github.io/webedit" class="logo-link"><img src="WebEdit.png" alt="WebEdit Logo"></a>
        <div class="controls-right">
            <button class="action-btn" onclick="toggleSearch()">
                <span class="material-symbols-outlined">search</span>
            </button>
            <button class="action-btn" id="modeBtn" onclick="toggleMode()">
                <span class="material-symbols-outlined" id="modeIcon">light_mode</span>
            </button>
            <select class="dropdown" onchange="setColor(this.value)">
                <option value="purple">Purple</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
            </select>
            <select class="dropdown" onchange="changeLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
        </div>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" id="editTab" onclick="switchView('edit')">Editor</button>
        <button class="tab-btn" id="previewTab" onclick="switchView('preview')">Preview</button>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="input-row">
            <input type="text" id="findInput" placeholder="Find...">
            <button class="md-btn" onclick="findNext()" id="findBtn">Find</button>
        </div>
        <div class="input-row">
            <input type="text" id="replaceInput" placeholder="Replace...">
            <button class="md-btn" onclick="replaceCurrent()" id="replaceBtn">Replace</button>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
        <div id="preview" class="preview-pane"></div>
    </div>

    <footer>
        <span>vibecoded by <a href="https://github.com/wlpne/" target="_blank">wlpne</a></span>
        <a href="https://github.com/wlpne/webedit" target="_blank">Source Code</a>
    </footer>

    <script>
        const editor = document.getElementById('editor'), preview = document.getElementById('preview'), controlPanel = document.getElementById('controlPanel'), body = document.body, modeIcon = document.getElementById('modeIcon');
        let currentMode = 'dark', currentColor = 'purple';
        const langData = {
            en: { edit: "Editor", prev: "Preview", find: "Find", replace: "Replace", placeholder: "Start typing..." },
            ru: { edit: "Редактор", prev: "Предпросмотр", find: "Найти", replace: "Заменить", placeholder: "Начните вводить..." }
        };
        function toggleSearch() { controlPanel.style.display = controlPanel.style.display === 'flex' ? 'none' : 'flex'; }
        function toggleMode() {
            body.classList.remove(currentMode);
            currentMode = currentMode === 'dark' ? 'light' : 'dark';
            body.classList.add(currentMode);
            modeIcon.textContent = currentMode === 'dark' ? 'light_mode' : 'dark_mode';
        }
        function setColor(c) { body.classList.remove(currentColor); currentColor = c; body.classList.add(currentColor); }
        function changeLang(lang) {
            document.getElementById('editTab').textContent = langData[lang].edit;
            document.getElementById('previewTab').textContent = langData[lang].prev;
            document.getElementById('findBtn').textContent = langData[lang].find;
            document.getElementById('replaceBtn').textContent = langData[lang].replace;
            editor.placeholder = langData[lang].placeholder;
        }
        function switchView(mode) {
            document.getElementById('editTab').classList.toggle('active', mode === 'edit');
            document.getElementById('previewTab').classList.toggle('active', mode === 'preview');
            if (mode === 'preview') { preview.innerHTML = marked.parse(editor.value); editor.style.display = 'none'; preview.style.display = 'block'; controlPanel.style.display = 'none'; }
            else { editor.style.display = 'block'; preview.style.display = 'none'; editor.focus(); }
        }
        function findNext() { const i = editor.value.indexOf(document.getElementById('findInput').value, editor.selectionStart + 1); if (i !== -1) { editor.setSelectionRange(i, i + document.getElementById('findInput').value.length); editor.focus(); } }
        function replaceCurrent() { const s = editor.selectionStart, e = editor.selectionEnd, r = document.getElementById('replaceInput').value; if (s !== e) { editor.value = editor.value.substring(0, s) + r + editor.value.substring(e); editor.setSelectionRange(s, s + r.length); } else findNext(); }
    </script>
</body>
</html>
