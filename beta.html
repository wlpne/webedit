<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebEdit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Code&family=Google+Sans+Flex:wght@400;500;600&display=swap');
        
        body.light.purple { --bg: #FEF7FF; --on-bg: #1D1B20; --surface: #F3EDF7; --primary: #6750A4; --on-primary: #FFFFFF; --sec-container: #E8DEF8; --on-sec-container: #1D192B; }
        body.dark.purple { --bg: #141218; --on-bg: #E6E0E9; --surface: #211F26; --primary: #D0BCFF; --on-primary: #381E72; --sec-container: #4A4458; --on-sec-container: #E8DEF8; }
        body.light.blue { --bg: #FDFBFF; --on-bg: #1A1C1E; --surface: #DFE2EB; --primary: #0061A4; --on-primary: #FFFFFF; --sec-container: #D1E4FF; --on-sec-container: #001D36; }
        body.dark.blue { --bg: #1A1C1E; --on-bg: #E2E2E6; --surface: #43474E; --primary: #9ECAFF; --on-primary: #003258; --sec-container: #00497D; --on-sec-container: #D1E4FF; }
        body.light.green { --bg: #FCFDF6; --on-bg: #1A1C19; --surface: #DFE4D8; --primary: #386A20; --on-primary: #FFFFFF; --sec-container: #B8F397; --on-sec-container: #042100; }
        body.dark.green { --bg: #1A1C19; --on-bg: #E2E3DD; --surface: #43483E; --primary: #9CD67D; --on-primary: #0C3900; --sec-container: #205107; --on-sec-container: #B8F397; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--on-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        .top-app-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.25rem; font-weight: 500; color: var(--primary); }
        .controls-right { display: flex; gap: 8px; align-items: center; }
        
        .dropdown { background: var(--surface); color: var(--on-bg); border: none; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        
        .mode-btn { background: var(--surface); border: none; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }
        .mode-btn svg { width: 24px; height: 24px; fill: var(--on-bg); transition: transform 0.5s ease; }
        .mode-btn.rotate svg { transform: rotate(180deg); }

        .view-tabs { display: flex; margin: 0 16px 8px 16px; background-color: var(--surface); border-radius: 16px; overflow: hidden; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--on-bg); padding: 10px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .tab-btn.active { background-color: var(--sec-container); color: var(--on-sec-container); font-weight: 600; }

        .control-panel { background-color: var(--surface); padding: 16px; border-radius: 24px; display: flex; flex-direction: column; gap: 12px; margin: 0 8px 8px 8px; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; background-color: var(--bg); color: var(--on-bg); border: 1px solid var(--primary); padding: 12px 16px; border-radius: 16px; font-family: inherit; }
        button.md-btn { background-color: var(--sec-container); color: var(--on-sec-container); border: none; padding: 10px 20px; border-radius: 20px; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
        button.md-btn.filled { background-color: var(--primary); color: var(--on-primary); }
        
        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        textarea { width: 100%; height: 100%; background: transparent; border: none; color: var(--on-bg); padding: 16px 24px; font-size: 16px; line-height: 1.6; outline: none; font-family: 'Google Sans Code', monospace; resize: none; }
        .preview-pane { display: none; width: 100%; height: 100%; padding: 16px 24px; overflow-y: auto; }
        
        footer { background-color: var(--surface); text-align: center; padding: 8px 16px 16px 16px; font-size: 0.75rem; color: var(--on-bg); opacity: 0.7; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body class="dark purple">

    <div class="top-app-bar">
        <h1>WebEdit</h1>
        <div class="controls-right">
            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">
                <svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42l1.42 1.42c.39.39 1.03.39 1.42 0s.39-1.03 0-1.42L5.99 4.58zm12.6 12.6c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42l1.42 1.42c.39.39 1.03.39 1.42 0 .39-.39.39-1.03 0-1.42l-1.42-1.42zM18.42 5.99c.39-.39.39-1.03 0-1.42-.39-.39-1.03-.39-1.42 0l-1.42 1.42c-.39.39-.39 1.03 0 1.42.39.39 1.03.39 1.42 0l1.42-1.42zM5.99 18.42c.39.39 1.03.39 1.42 0 .39-.39.39-1.03 0-1.42l-1.42-1.42c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42l1.42 1.42z"></path></svg>
            </button>
            <select class="dropdown" onchange="setColor(this.value)">
                <option value="purple">Purple</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
            </select>
            <select class="dropdown" onchange="changeLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
        </div>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" id="editTab" onclick="switchView('edit')">Editor</button>
        <button class="tab-btn" id="previewTab" onclick="switchView('preview')">Preview</button>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="input-row">
            <input type="text" id="findInput" placeholder="Find...">
            <button class="md-btn" onclick="findNext()" id="findBtn">Find</button>
        </div>
        <div class="input-row">
            <input type="text" id="replaceInput" placeholder="Replace...">
            <button class="md-btn" onclick="replaceCurrent()" id="replaceBtn">Replace</button>
            <button class="md-btn filled" onclick="replaceAll()" id="allBtn">All</button>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
        <div id="preview" class="preview-pane"></div>
    </div>

    <footer>vibecoded by <a href="https://github.com/wlpne/" target="_blank">wlpne</a></footer>

    <script>
        const editor = document.getElementById('editor'), preview = document.getElementById('preview'), controlPanel = document.getElementById('controlPanel'), body = document.body, modeBtn = document.getElementById('modeBtn');
        let currentMode = 'dark', currentColor = 'purple';
        const langData = {
            en: { edit: "Editor", prev: "Preview", find: "Find", replace: "Replace", all: "All", placeholder: "Start typing..." },
            ru: { edit: "Редактор", prev: "Предпросмотр", find: "Найти", replace: "Заменить", all: "Все", placeholder: "Начните вводить..." }
        };
        function toggleMode() {
            body.classList.remove(currentMode);
            currentMode = currentMode === 'dark' ? 'light' : 'dark';
            body.classList.add(currentMode);
            modeBtn.classList.toggle('rotate');
        }
        function setColor(c) {
            body.classList.remove(currentColor);
            currentColor = c;
            body.classList.add(currentColor);
        }
        function changeLang(lang) {
            document.getElementById('editTab').textContent = langData[lang].edit;
            document.getElementById('previewTab').textContent = langData[lang].prev;
            document.getElementById('findBtn').textContent = langData[lang].find;
            document.getElementById('replaceBtn').textContent = langData[lang].replace;
            document.getElementById('allBtn').textContent = langData[lang].all;
            editor.placeholder = langData[lang].placeholder;
        }
        function switchView(mode) {
            document.getElementById('editTab').classList.toggle('active', mode === 'edit');
            document.getElementById('previewTab').classList.toggle('active', mode === 'preview');
            if (mode === 'preview') { preview.innerHTML = marked.parse(editor.value); editor.style.display = 'none'; preview.style.display = 'block'; controlPanel.style.display = 'none'; }
            else { editor.style.display = 'block'; preview.style.display = 'none'; controlPanel.style.display = 'flex'; editor.focus(); }
        }
        function findNext() {
            const q = document.getElementById('findInput').value;
            const i = editor.value.indexOf(q, editor.selectionStart + 1);
            if (i !== -1) { editor.setSelectionRange(i, i + q.length); editor.focus(); }
        }
        function replaceCurrent() {
            const s = editor.selectionStart, e = editor.selectionEnd, r = document.getElementById('replaceInput').value;
            if (s !== e) { editor.value = editor.value.substring(0, s) + r + editor.value.substring(e); editor.setSelectionRange(s, s + r.length); }
            else { findNext(); }
        }
        function replaceAll() { editor.value = editor.value.split(document.getElementById('findInput').value).join(document.getElementById('replaceInput').value); }
    </script>
</body>
</html>
