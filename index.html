<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebEdit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Code&display=swap');
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        body.light.purple { --bg: #FEF7FF; --on-bg: #250E44; --surface: #F3EDF7; --primary: #6A538C; --on-primary: #FFFFFF; --sec-container: #D6BBFB; --on-sec-container: #250E44; }
        body.dark.purple { --bg: #141218; --on-bg: #EDDCFF; --surface: #211F26; --primary: #D6BBFB; --on-primary: #250E44; --sec-container: #523C73; --on-sec-container: #F8EDFF; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--on-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        .top-app-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo-link img { height: 32px; display: block; }
        .controls-right { display: flex; gap: 8px; align-items: center; }
        
        .action-btn { background: var(--surface); border: none; padding: 8px; border-radius: 12px; cursor: pointer; color: var(--on-bg); display: flex; align-items: center; }
        .dropdown { background: var(--surface); color: var(--on-bg); border: none; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; }
        
        .view-tabs { display: flex; margin: 0 16px 8px 16px; background-color: var(--surface); border-radius: 16px; overflow: hidden; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--on-bg); padding: 10px; font-weight: 500; cursor: pointer; }
        .tab-btn.active { background-color: var(--sec-container); color: var(--on-sec-container); }

        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        textarea { width: 100%; height: 100%; background: transparent; border: none; color: var(--on-bg); padding: 16px; font-family: 'Google Sans Code', monospace; resize: none; outline: none; }
        .preview-pane { display: none; width: 100%; height: 100%; padding: 16px; overflow-y: auto; }

        .toolbar { padding: 8px; display: flex; gap: 8px; justify-content: center; background: var(--surface); }
        .md-btn { background: var(--sec-container); color: var(--on-sec-container); border: none; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }

        .fab { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: var(--on-primary); width: 56px; height: 56px; border-radius: 16px; border: none; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .menu { position: fixed; bottom: 90px; right: 24px; background: var(--surface); padding: 8px; border-radius: 20px; display: none; flex-direction: column; gap: 8px; z-index: 10; }
        .menu-item { background: var(--sec-container); color: var(--on-sec-container); border: none; padding: 12px 24px; border-radius: 16px; cursor: pointer; text-align: left; }
    </style>
</head>
<body class="dark purple">

    <div class="top-app-bar">
        <a href="https://wlpne.github.io/webedit" class="logo-link"><img id="logoImg" src="WebEditDark.png" alt="WebEdit"></a>
        <div class="controls-right">
            <select class="dropdown" id="langSelect" onchange="updateLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <button class="action-btn" onclick="toggleMode()"><span class="material-symbols-outlined">light_mode</span></button>
        </div>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" id="editTab" onclick="switchView('edit')">Editor</button>
        <button class="tab-btn" id="previewTab" onclick="switchView('preview')">Preview</button>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..."></textarea>
        <div id="preview" class="preview-pane"></div>
    </div>

    <div class="toolbar">
        <button class="md-btn" onclick="insert('**', '**')"><span class="material-symbols-outlined">format_bold</span></button>
        <button class="md-btn" onclick="insert('*', '*')"><span class="material-symbols-outlined">format_italic</span></button>
        <button class="md-btn" onclick="insert('(', ')[]')"><span class="material-symbols-outlined">link</span></button>
        <button class="md-btn" onclick="insertNumberedList()"><span class="material-symbols-outlined">format_list_numbered</span></button>
    </div>

    <button class="fab" onclick="toggleMenu()"><span class="material-symbols-outlined">save</span></button>
    <div class="menu" id="saveMenu">
        <button class="menu-item" onclick="saveFile('txt')">Save as TXT</button>
        <button class="menu-item" onclick="saveFile('md')">Save as MD</button>
    </div>

    <script>
        const editor = document.getElementById('editor'), preview = document.getElementById('preview');
        const langData = {
            en: { edit: "Editor", prev: "Preview", placeholder: "Start typing..." },
            ru: { edit: "Редактор", prev: "Предпросмотр", placeholder: "Начните вводить..." }
        };

        function updateLang(lang) {
            document.getElementById('editTab').textContent = langData[lang].edit;
            document.getElementById('previewTab').textContent = langData[lang].prev;
            editor.placeholder = langData[lang].placeholder;
        }

        function switchView(mode) {
            document.getElementById('editTab').classList.toggle('active', mode === 'edit');
            document.getElementById('previewTab').classList.toggle('active', mode === 'preview');
            if (mode === 'preview') { preview.innerHTML = marked.parse(editor.value); editor.style.display = 'none'; preview.style.display = 'block'; }
            else { editor.style.display = 'block'; preview.style.display = 'none'; }
        }

        function insert(pre, post) {
            const s = editor.selectionStart, e = editor.selectionEnd, v = editor.value;
            editor.value = v.substring(0, s) + pre + v.substring(s, e) + post + v.substring(e);
            editor.focus();
        }

        function insertNumberedList() {
            const textBefore = editor.value.substring(0, editor.selectionStart);
            const lines = textBefore.split('\n');
            const matches = textBefore.match(/^\d+(?=\.\s)/gm);
            const nextNum = matches ? parseInt(matches[matches.length - 1]) + 1 : 1;
            insert('\n' + nextNum + '. ', '');
        }

        function toggleMenu() { const m = document.getElementById('saveMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }

        function saveFile(ext) {
            const blob = new Blob([editor.value], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'doc.' + ext; a.click();
        }

        function toggleMode() { 
            document.body.classList.toggle('dark'); 
            document.body.classList.toggle('light');
            document.getElementById('logoImg').src = document.body.classList.contains('dark') ? 'WebEditDark.png' : 'WebEditLight.png';
        }
    </script>
</body>
      </html>
