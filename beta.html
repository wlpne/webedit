<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebEdit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Code&family=Google+Sans+Flex:wght@400;500;600&display=swap');
        
        body.light.purple { --bg: #FEF7FF; --on-bg: #1D1B20; --surface: #F3EDF7; --primary: #6750A4; --on-primary: #FFFFFF; --sec-container: #E8DEF8; --on-sec-container: #1D192B; --outline: #79747E; --error: #B3261E; }
        body.dark.purple { --bg: #141218; --on-bg: #E6E0E9; --surface: #211F26; --primary: #D0BCFF; --on-primary: #381E72; --sec-container: #4A4458; --on-sec-container: #E8DEF8; --outline: #938F99; --error: #F2B8B5; }
        body.light.blue { --bg: #FDFBFF; --on-bg: #1A1C1E; --surface: #DFE2EB; --primary: #0061A4; --on-primary: #FFFFFF; --sec-container: #D1E4FF; --on-sec-container: #001D36; --outline: #73777F; --error: #B3261E; }
        body.dark.blue { --bg: #1A1C1E; --on-bg: #E2E2E6; --surface: #43474E; --primary: #9ECAFF; --on-primary: #003258; --sec-container: #00497D; --on-sec-container: #D1E4FF; --outline: #8D9199; --error: #F2B8B5; }
        body.light.green { --bg: #FCFDF6; --on-bg: #1A1C19; --surface: #DFE4D8; --primary: #386A20; --on-primary: #FFFFFF; --sec-container: #B8F397; --on-sec-container: #042100; --outline: #73796E; --error: #B3261E; }
        body.dark.green { --bg: #1A1C19; --on-bg: #E2E3DD; --surface: #43483E; --primary: #9CD67D; --on-primary: #0C3900; --sec-container: #205107; --on-sec-container: #B8F397; --outline: #8D9287; --error: #F2B8B5; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Google Sans Flex', sans-serif; font-variation-settings: 'ROND' 100; background-color: var(--bg); color: var(--on-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        .top-app-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.25rem; font-weight: 500; color: var(--primary); }
        .stats { font-size: 0.75rem; color: var(--outline); }
        .customizer { display: flex; align-items: center; gap: 12px; }
        .color-swatch { width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer; }
        .swatch-purple { background-color: #6750A4; }
        .swatch-blue { background-color: #0061A4; }
        .swatch-green { background-color: #386A20; }
        .theme-toggle { background: none; border: none; color: var(--on-bg); font-size: 1.2rem; cursor: pointer; }

        .view-tabs { display: flex; margin: 0 16px 8px 16px; background-color: var(--surface); border-radius: 16px; overflow: hidden; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--on-bg); padding: 10px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        .tab-btn.active { background-color: var(--sec-container); color: var(--on-sec-container); font-weight: 600; }

        .control-panel { background-color: var(--surface); padding: 16px; border-radius: 24px; display: flex; flex-direction: column; gap: 12px; margin: 0 8px 8px 8px; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; background-color: var(--bg); color: var(--on-bg); border: 1px solid var(--outline); padding: 12px 16px; border-radius: 16px; font-family: inherit; }
        button.md-btn { background-color: var(--sec-container); color: var(--on-sec-container); border: none; padding: 10px 20px; border-radius: 20px; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
        button.md-btn.filled { background-color: var(--primary); color: var(--on-primary); }
        .options-row { display: flex; gap: 16px; font-size: 0.875rem; align-items: center; }
        .status-msg { margin-left: auto; font-size: 0.85rem; font-weight: 500; }

        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        textarea, .preview-pane { width: 100%; height: 100%; background-color: transparent; border: none; color: var(--on-bg); padding: 16px 24px; font-size: 16px; line-height: 1.6; outline: none; overflow-y: auto; }
        textarea { font-family: 'Google Sans Code', monospace; font-variation-settings: 'ROND' 100; resize: none; }
        .preview-pane { display: none; }
        
        .mobile-action-bar { background-color: var(--surface); padding: 12px; display: flex; gap: 8px; overflow-x: auto; }
        .mobile-action-bar button { flex: 0 0 auto; padding: 8px 16px; background-color: var(--bg); color: var(--on-bg); border: 1px solid var(--outline); border-radius: 8px; }
        footer { background-color: var(--surface); text-align: center; padding: 8px 16px 16px 16px; font-size: 0.75rem; color: var(--outline); }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body class="dark purple" id="bodyElement">

    <div class="top-app-bar">
        <div class="title-area">
            <h1>WebEdit</h1>
            <div class="stats" id="stats">L: 1 | W: 0 | C: 0</div>
        </div>
        <div class="customizer">
            <button onclick="toggleLang()" style="background:var(--surface); border:none; color:var(--on-bg); padding:4px 8px; border-radius:8px; cursor:pointer;" id="langBtn">EN/RU</button>
            <button class="color-swatch swatch-purple" onclick="setColor('purple')"></button>
            <button class="color-swatch swatch-blue" onclick="setColor('blue')"></button>
            <button class="color-swatch swatch-green" onclick="setColor('green')"></button>
            <button class="theme-toggle" onclick="toggleMode()">🌓</button>
        </div>
    </div>

    <div class="view-tabs">
        <button class="tab-btn active" id="editTab" onclick="switchView('edit')">Editor</button>
        <button class="tab-btn" id="previewTab" onclick="switchView('preview')">Preview</button>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="input-row">
            <input type="text" id="findInput" placeholder="Find...">
            <button class="md-btn" onclick="findNext()" id="findBtn">Find</button>
        </div>
        <div class="input-row">
            <input type="text" id="replaceInput" placeholder="Replace...">
            <button class="md-btn" onclick="replaceCurrent()" id="replaceBtn">Replace</button>
            <button class="md-btn filled" onclick="replaceAll()" id="allBtn">All</button>
        </div>
        <div class="options-row">
            <label><input type="checkbox" id="matchCase"> <span id="matchCaseText">Match Case</span></label>
            <label><input type="checkbox" id="useRegex"> <span id="regexText">Regex</span></label>
            <div class="status-msg" id="statusMsg"></div>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
        <div id="preview" class="preview-pane"></div>
    </div>

    <div class="mobile-action-bar">
        <button onclick="insertTab()">Tab</button>
        <button onclick="focusInput('findInput')">Find</button>
        <button onclick="focusInput('replaceInput')">Replace</button>
        <button onclick="selectAllText()">Select All</button>
    </div>

    <footer>vibecoded by <a href="https://github.com/wlpne/" target="_blank">wlpne</a></footer>

    <script>
        const editor = document.getElementById('editor'), preview = document.getElementById('preview'), bodyEl = document.getElementById('bodyElement'), statsPanel = document.getElementById('stats'), statusMsg = document.getElementById('statusMsg'), controlPanel = document.getElementById('controlPanel');
        let currentLang = 'en', lastSearchIndex = 0, currentMode = 'dark', currentColor = 'purple';
        const langData = {
            en: { edit: "Editor", prev: "Preview", find: "Find", replace: "Replace", all: "All", match: "Match Case", regex: "Regex" },
            ru: { edit: "Редактор", prev: "Предпросмотр", find: "Найти", replace: "Заменить", all: "Все", match: "Учитывать регистр", regex: "Регулярное выражение" }
        };
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            document.getElementById('editTab').textContent = langData[currentLang].edit;
            document.getElementById('previewTab').textContent = langData[currentLang].prev;
            document.getElementById('findBtn').textContent = langData[currentLang].find;
            document.getElementById('replaceBtn').textContent = langData[currentLang].replace;
            document.getElementById('allBtn').textContent = langData[currentLang].all;
            document.getElementById('matchCaseText').textContent = langData[currentLang].match;
            document.getElementById('regexText').textContent = langData[currentLang].regex;
        }
        function switchView(mode) {
            document.getElementById('editTab').classList.toggle('active', mode === 'edit');
            document.getElementById('previewTab').classList.toggle('active', mode === 'preview');
            if (mode === 'preview') { preview.innerHTML = marked.parse(editor.value); editor.style.display = 'none'; preview.style.display = 'block'; controlPanel.style.display = 'none'; }
            else { editor.style.display = 'block'; preview.style.display = 'none'; controlPanel.style.display = 'flex'; editor.focus(); }
        }
        function toggleMode() { bodyEl.classList.remove(currentMode); currentMode = currentMode === 'dark' ? 'light' : 'dark'; bodyEl.classList.add(currentMode); }
        function setColor(c) { bodyEl.classList.remove(currentColor); currentColor = c; bodyEl.classList.add(currentColor); }
        function updateStats() { const t = editor.value; statsPanel.textContent = `L: ${t === "" ? 1 : t.split('\n').length} | W: ${t.trim() === "" ? 0 : t.trim().split(/\s+/).length} | C: ${t.length}`; }
        editor.addEventListener('input', updateStats);
        function showStatus(m, e = false) { statusMsg.textContent = m; statusMsg.style.color = e ? "var(--error)" : "var(--primary)"; setTimeout(() => statusMsg.textContent = "", 3000); }
        function findNext() {
            const q = document.getElementById('findInput').value; if (!q) return;
            const reg = new RegExp(q, document.getElementById('matchCase').checked ? 'g' : 'gi');
            const m = editor.value.substring(lastSearchIndex).match(reg);
            if (m) { const i = lastSearchIndex + editor.value.substring(lastSearchIndex).indexOf(m[0]); editor.setSelectionRange(i, i + m[0].length); lastSearchIndex = i + m[0].length; }
            else { lastSearchIndex = 0; showStatus("No matches"); }
        }
        function replaceCurrent() { const s = editor.selectionStart, e = editor.selectionEnd, r = document.getElementById('replaceInput').value; editor.value = editor.value.substring(0, s) + r + editor.value.substring(e); updateStats(); }
        function replaceAll() { const f = document.getElementById('findInput').value, r = document.getElementById('replaceInput').value; editor.value = editor.value.split(f).join(r); updateStats(); }
        function insertTab() { const s = editor.selectionStart; editor.value = editor.value.substring(0, s) + "    " + editor.value.substring(editor.selectionEnd); editor.selectionStart = editor.selectionEnd = s + 4; updateStats(); }
        function focusInput(id) { switchView('edit'); document.getElementById(id).focus(); }
        function selectAllText() { switchView('edit'); editor.select(); }
    </script>
</body>
</html>
