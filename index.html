<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebEdit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Code&display=swap');
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; color: var(--on-bg); }

        body.light.purple { --bg: #FEF7FF; --on-bg: #250E44; --surface: #F3EDF7; --primary: #6A538C; --on-primary: #FFFFFF; --sec-container: #D6BBFB; --on-sec-container: #250E44; }
        body.dark.purple { --bg: #141218; --on-bg: #EDDCFF; --surface: #211F26; --primary: #D6BBFB; --on-primary: #250E44; --sec-container: #523C73; --on-sec-container: #F8EDFF; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--on-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        .top-app-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo-link img { height: 32px; display: block; }
        .controls-right { display: flex; gap: 8px; align-items: center; }
        
        .action-btn { background: var(--surface); border: none; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        textarea { width: 100%; height: 100%; background: transparent; border: none; color: var(--on-bg); padding: 16px 24px; font-size: 16px; font-family: 'Google Sans Code', monospace; resize: none; outline: none; }
        .preview-pane { display: none; width: 100%; height: 100%; padding: 16px 24px; overflow-y: auto; }
        
        .toolbar { padding: 8px; display: flex; gap: 8px; justify-content: center; background: var(--surface); }
        .md-btn { background: var(--sec-container); color: var(--on-sec-container); border: none; padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #disclaimer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .disclaimer-box { background: var(--surface); padding: 24px; border-radius: 24px; text-align: center; max-width: 80%; }
    </style>
</head>
<body class="dark purple">

    <div id="disclaimer" style="display:none;">
        <div class="disclaimer-box">
            <p>This product is not finished and may contain bugs. Feel free to file an issue in the repository.</p>
            <br><button class="md-btn" onclick="closeDisclaimer()">Understood</button>
        </div>
    </div>

    <div class="top-app-bar">
        <a href="https://wlpne.github.io/webedit" class="logo-link"><img id="logoImg" src="WebEditDark.png" alt="WebEdit"></a>
        <div class="controls-right">
            <button class="action-btn" onclick="saveFile('txt')"><span class="material-symbols-outlined">text_snippet</span></button>
            <button class="action-btn" onclick="saveFile('md')"><span class="material-symbols-outlined">markdown</span></button>
            <button class="action-btn" id="modeBtn" onclick="toggleMode()"><span class="material-symbols-outlined" id="modeIcon">light_mode</span></button>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
        <div id="preview" class="preview-pane"></div>
    </div>

    <div class="toolbar">
        <button class="md-btn" onclick="insert('**', '**')"><span class="material-symbols-outlined">format_bold</span></button>
        <button class="md-btn" onclick="insert('*', '*')"><span class="material-symbols-outlined">format_italic</span></button>
        <button class="md-btn" onclick="insert('[', '](url)')"><span class="material-symbols-outlined">link</span></button>
        <button class="md-btn" onclick="insert('| H | H |\n|---|---|\n| C | C |', '')"><span class="material-symbols-outlined">table</span></button>
        <button class="md-btn" onclick="switchView()"><span class="material-symbols-outlined">preview</span></button>
    </div>

    <script>
        const editor = document.getElementById('editor'), preview = document.getElementById('preview'), logoImg = document.getElementById('logoImg');
        let isPreview = false;

        if (!localStorage.getItem('seenDisclaimer')) document.getElementById('disclaimer').style.display = 'flex';
        function closeDisclaimer() { localStorage.setItem('seenDisclaimer', 'true'); document.getElementById('disclaimer').style.display = 'none'; }

        function switchView() {
            isPreview = !isPreview;
            if (isPreview) { preview.innerHTML = marked.parse(editor.value); editor.style.display = 'none'; preview.style.display = 'block'; }
            else { editor.style.display = 'block'; preview.style.display = 'none'; }
        }

        function insert(pre, post) {
            const start = editor.selectionStart, end = editor.selectionEnd, val = editor.value;
            editor.value = val.substring(0, start) + pre + val.substring(start, end) + post + val.substring(end);
            editor.focus();
        }

        function saveFile(ext) {
            const blob = new Blob([editor.value], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'document.' + ext;
            a.click();
        }

        function toggleMode() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            logoImg.src = document.body.classList.contains('dark') ? 'WebEditDark.png' : 'WebEditLight.png';
        }
    </script>
</body>
</html>
